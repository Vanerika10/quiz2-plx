<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Descubra o Que Está Travando Sua Reconstrução — Vanerika Amorim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBF4F2;--surface:#FFFFFF;--primary:#C8706B;--primary-light:#F5D4D0;
  --rose:#E0928E;--accent:#D4A847;--accent-dark:#B8902E;
  --text:#2C2420;--muted:#7A6A62;--light:#A89890;--border:#EDD8D5;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:linear-gradient(160deg,#FBF4F2 0%,#F5D0CB 100%);background-attachment:fixed;-webkit-font-smoothing:antialiased;padding:24px 16px 80px}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.25}
p{line-height:1.6}
.app{max-width:480px;margin:0 auto;padding-top:16px}
.progress-bar{position:fixed;top:0;left:0;height:4px;width:0;background:var(--primary);transition:width .4s ease;z-index:999;border-radius:0 2px 2px 0}
.screen{animation:si .3s ease}
@keyframes si{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.logo{font-size:36px;text-align:center;margin-bottom:8px}
.brand{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--primary);text-align:center;font-weight:700;margin-bottom:18px}
.card{background:var(--surface);border-radius:16px;box-shadow:0 4px 24px rgba(200,112,107,.12);padding:24px;margin-bottom:16px}
.badge{display:inline-block;background:var(--primary-light);color:var(--primary);font-size:12px;font-weight:700;padding:6px 16px;border-radius:20px;margin-bottom:14px}
.entry-hero{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.2;margin:10px 0 14px;color:var(--text)}
.entry-sub{font-size:15px;color:var(--muted);line-height:1.55;margin-bottom:12px}
.entry-p{font-size:14px;color:var(--muted);line-height:1.6;margin-top:12px}
.highlight{background:var(--primary-light);border:1.5px solid var(--primary);border-radius:12px;padding:14px 16px;font-size:14px;color:var(--text);margin:18px 0;line-height:1.5}
.btn{display:block;width:100%;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;border-radius:50px;padding:16px 28px;transition:transform .15s,filter .15s;margin-top:16px;letter-spacing:.3px;text-align:center;text-decoration:none}
.btn:hover{filter:brightness(1.07)}.btn:active{transform:scale(.98)}
.btn-gold{background:var(--accent);color:#fff}
.btn-rose{background:var(--primary);color:#fff}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary);font-weight:600;font-size:14px;margin-top:10px}
.muted-small{font-size:12px;color:var(--light);text-align:center;margin-top:10px}
.center{text-align:center}
.q-label{font-size:11px;color:var(--primary);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.q-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.3}
.q-sub{font-size:13px;color:var(--muted);margin-bottom:14px}
.options{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.opt{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;font-size:14px;color:var(--text);line-height:1.45;transition:all .2s;user-select:none}
.opt:hover{border-color:var(--primary);background:#FFF7F6}
.opt.selected{border-color:var(--primary);background:var(--primary-light);border-width:2px}
.check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;margin-top:1px;font-size:11px;color:#fff;transition:all .2s}
.opt.selected .check{background:var(--primary);border-color:var(--primary)}
.opt.selected .check::after{content:"✓";font-weight:700}
.chk-opt{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;font-size:14px;color:var(--text);line-height:1.45;transition:all .2s;user-select:none}
.chk-opt:hover{border-color:var(--primary);background:#FFF7F6}
.chk-opt.selected{border-color:var(--primary);background:var(--primary-light);border-width:2px}
.chk-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;margin-top:1px;font-size:11px;color:#fff;transition:all .2s}
.chk-opt.selected .chk-box{background:var(--primary);border-color:var(--primary)}
.chk-opt.selected .chk-box::after{content:"✓";font-weight:700}
.scale-statement{background:var(--primary-light);border-left:4px solid var(--primary);border-radius:8px;padding:16px;font-style:italic;font-size:15px;color:var(--text);line-height:1.55;margin-bottom:22px}
.scale-box{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:20px 16px}
.scale-axis{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-weight:600;margin-bottom:10px;padding:0 2px}
.scale-track{display:flex;justify-content:space-between;align-items:center;position:relative;padding:4px 0}
.scale-track::before{content:'';position:absolute;left:22px;right:22px;top:50%;height:2px;background:var(--border);transform:translateY(-50%);z-index:0}
.scale-pt{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;z-index:1;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.scale-pt:hover{border-color:var(--primary);color:var(--primary)}
.scale-pt.sel{background:var(--primary);border-color:var(--primary);color:#fff;transform:scale(1.12)}
.scale-sub{display:flex;justify-content:space-between;margin-top:10px;padding:0 2px}
.scale-sub span{font-size:10px;color:var(--light);text-align:center;max-width:80px;line-height:1.3}
.scale-sub .mid{text-align:center;flex:1}
.info-badge{display:inline-block;background:var(--primary-light);color:var(--primary);font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;margin-bottom:12px}
.info-source{font-size:11px;font-style:italic;color:var(--light);margin-top:12px;line-height:1.5}
.gauge-bar{display:flex;border-radius:50px;overflow:hidden;height:20px;margin:16px 0 4px}
.gauge-bar span{flex:1}
.gauge-bar .g1{background:#C8E6C9}.gauge-bar .g2{background:#FFF9C4}
.gauge-bar .g3{background:#FFE0B2}.gauge-bar .g4{background:#FFCCBC}
.gauge-bar .g5{background:#FFCDD2}
.gauge-pointer{position:relative;height:14px}
.gauge-pointer::before{content:"▲";position:absolute;left:60%;transform:translateX(-50%);color:var(--primary);font-size:14px;line-height:1}
.gauge-labels{display:flex;font-size:10px;color:var(--muted);margin-bottom:14px}
.gauge-labels span{flex:1;text-align:center}
.diag-box{background:#FFF7F6;border:1px solid var(--primary);border-radius:12px;padding:14px;margin-top:14px;font-size:14px;color:var(--text)}
.quad-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.quad{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px}
.quad h4{font-family:'DM Sans';font-size:12px;font-weight:700;color:var(--primary);margin-bottom:4px}
.quad p{font-size:12px;color:var(--muted);line-height:1.4}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.col-bad{background:#FFF5F5;border-radius:10px;padding:12px}
.col-good{background:#F5FFF7;border-radius:10px;padding:12px}
.compare h4{font-family:'DM Sans';font-size:12px;font-weight:700;margin-bottom:10px}
.col-bad h4{color:#8B2C2C}.col-good h4{color:#2E6B3D}
.cmp-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.cmp-list li{font-size:12px;color:var(--text);line-height:1.4;padding-bottom:7px;border-bottom:1px solid rgba(0,0,0,.06)}
.cmp-list li:last-child{border:none;padding:0}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.stat-card{background:var(--primary-light);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-family:'Playfair Display';font-size:28px;font-weight:700;color:var(--primary);display:block;margin-bottom:4px}
.stat-card p{font-size:11px;color:var(--text);line-height:1.4}
.story{background:var(--primary-light);border-left:4px solid var(--primary);border-radius:8px;padding:18px;font-style:italic;font-size:14px;line-height:1.65;color:var(--text);margin-bottom:18px}
.data-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:13px;color:var(--text)}
.dark-box{background:var(--text);color:#fff;border-radius:12px;padding:16px;margin:16px 0;font-size:14px;font-style:italic;text-align:center;line-height:1.55}
.loading-bar{background:var(--border);border-radius:50px;height:10px;overflow:hidden;margin:20px 0}
.loading-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--rose));border-radius:50px;animation:ld 4s ease forwards}
@keyframes ld{to{width:100%}}
#ldStatus{font-size:13px;color:var(--muted);text-align:center;margin-top:6px;min-height:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.field input{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:14px;font-family:'DM Sans';font-size:15px;color:var(--text);background:#fff;transition:border-color .2s}
.field input:focus{outline:none;border-color:var(--primary)}
.field input::placeholder{color:var(--light)}
.divider{height:1px;background:var(--border);margin:18px 0}
.chart{width:100%;height:140px;margin:12px 0}
.section-title{font-size:16px;font-weight:700;margin:22px 0 10px;color:var(--text)}
.cost-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:8px}
.cost-list li{font-size:13px;color:var(--text);display:flex;gap:8px;align-items:flex-start;padding:4px 0}
.cost-list li::before{content:"⚠️";flex-shrink:0}
.bump{background:#FFF7F6;border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-top:10px;display:flex;gap:12px;align-items:flex-start}
.bump-ck{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--primary);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;font-size:13px;color:#fff;transition:all .2s}
.bump-ck.on{background:var(--primary);border-color:var(--primary)}
.bump-ck.on::after{content:"✓";font-weight:700}
.bump h5{font-size:14px;font-weight:700;margin-bottom:4px}
.bump p{font-size:12px;color:var(--muted);margin-bottom:6px;line-height:1.4}
.bump .pr{font-weight:700;color:var(--primary);font-size:14px}

/* ===== RESEARCH SCREENSHOT ===== */
.sc-wrap{border-radius:10px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.25);border:1px solid #c0c0c0;margin:14px 0;font-family:Arial,Helvetica,sans-serif}
.sc-browser{background:#e8e8e8;padding:7px 10px 5px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #ccc}
.sc-dots{display:flex;gap:5px}
.sc-dot{width:11px;height:11px;border-radius:50%}
.sc-dot-r{background:#ff5f57;border:1px solid #e0443e}
.sc-dot-y{background:#ffbd2e;border:1px solid #dea123}
.sc-dot-g{background:#28c840;border:1px solid #1aab29}
.sc-nav-btns{display:flex;gap:4px}
.sc-nav-btn{width:20px;height:16px;background:#c8c8c8;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#666}
.sc-url{flex:1;background:#fff;border:1px solid #c8c8c8;border-radius:12px;padding:3px 12px;font-size:10px;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px}
.sc-site-hd{background:#00274c;padding:8px 14px;display:flex;align-items:center;justify-content:space-between}
.sc-site-left{display:flex;align-items:center;gap:8px}
.sc-logo{width:26px;height:26px;background:#ffcb05;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#00274c;letter-spacing:-.5px}
.sc-site-name{font-size:11px;font-weight:700;color:#fff;line-height:1.2}
.sc-site-sub{font-size:8px;color:rgba(255,255,255,.65)}
.sc-nav-links{display:flex;gap:14px;font-size:9px;color:rgba(255,255,255,.65)}
.sc-nav-links span:first-child{color:#ffcb05;border-bottom:1px solid #ffcb05;padding-bottom:1px}
.sc-sub-hd{background:#003a7a;padding:5px 14px;display:flex;gap:16px}
.sc-sub-link{font-size:9px;color:rgba(255,255,255,.7);padding:3px 0}
.sc-sub-link.active{color:#ffcb05;border-bottom:1px solid #ffcb05}
.sc-body{background:#f4f4f4;padding:14px}
.sc-breadcrumb{font-size:8px;color:#888;margin-bottom:8px}
.sc-breadcrumb span{color:#00274c}
.sc-section-tag{display:inline-block;background:#00274c;color:#fff;font-size:7px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:2px;margin-bottom:6px}
.sc-title{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:5px;line-height:1.3;font-family:'Times New Roman',serif}
.sc-meta{font-size:8px;color:#777;margin-bottom:10px;line-height:1.6;border-bottom:1px solid #ddd;padding-bottom:8px}
.sc-meta strong{color:#444}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.sc-stat{background:#fff;border:1px solid #ddd;border-radius:4px;padding:10px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sc-stat-num{font-size:22px;font-weight:700;color:#00274c;display:block;line-height:1}
.sc-stat-label{font-size:7px;color:#666;line-height:1.4;margin-top:4px;display:block}
.sc-finding{background:#fffde7;border-left:3px solid #ffcb05;padding:8px 10px;font-size:8.5px;color:#333;line-height:1.55;margin-top:10px}
.sc-finding strong{color:#005a9c}
.sc-footer{background:#e0e0e0;border-top:1px solid #ccc;padding:5px 14px;display:flex;justify-content:space-between;align-items:center}
.sc-footer-left{font-size:7px;color:#666}
.sc-footer-right{font-size:7px;color:#888;font-style:italic}

/* ===== WHATSAPP SCREENSHOT ===== */
.wa-outer{max-width:295px;margin:16px auto 8px}
.wa-wrap{border-radius:32px;overflow:hidden;background:#111;box-shadow:0 24px 70px rgba(0,0,0,.55),inset 0 0 0 2px #2a2a2a;border:2px solid #1a1a1a}
.wa-notch-bar{background:#0a0a0a;height:30px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px}
.wa-notch{width:100px;height:20px;background:#111;border-radius:20px;border:1.5px solid #222}
.wa-status-bar{background:#0a131a;padding:4px 14px 3px;display:flex;justify-content:space-between;align-items:center}
.wa-time{font-size:12px;font-weight:700;color:#fff;font-family:-apple-system,sans-serif}
.wa-status-icons{display:flex;align-items:center;gap:5px}
.wa-signal{display:flex;align-items:flex-end;gap:1.5px;height:10px}
.wa-signal span{display:inline-block;width:2.5px;background:#fff;border-radius:1px}
.wa-signal span:nth-child(1){height:3px}
.wa-signal span:nth-child(2){height:5px}
.wa-signal span:nth-child(3){height:7px}
.wa-signal span:nth-child(4){height:10px}
.wa-wifi{font-size:10px;color:#fff;line-height:1}
.wa-bat{width:18px;height:9px;border:1.5px solid rgba(255,255,255,.8);border-radius:2px;position:relative;display:flex;align-items:center;padding:1.5px}
.wa-bat::after{content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%);width:2px;height:4px;background:rgba(255,255,255,.8);border-radius:0 1px 1px 0}
.wa-bat-fill{flex:1;height:100%;background:#4cd964;border-radius:1px}
.wa-header{background:#1f2c34;padding:9px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.wa-back{font-size:20px;color:#aebac1;line-height:1;margin-right:-4px}
.wa-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#e8a0a0,#c8706b);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.wa-info{flex:1;min-width:0}
.wa-cname{font-size:15px;font-weight:600;color:#e9edef;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wa-online{font-size:11px;color:#8696a0}
.wa-hicons{display:flex;gap:18px;font-size:18px;color:#aebac1}
.wa-chat{background-color:#0d1117;background-image:radial-gradient(circle,rgba(255,255,255,.025) 1px,transparent 1px);background-size:22px 22px;padding:10px 10px 14px;display:flex;flex-direction:column;gap:3px;min-height:300px}
.wa-date-chip{text-align:center;margin:4px 0 6px}
.wa-date-chip span{background:#182229;color:#8696a0;font-size:10px;padding:4px 10px;border-radius:8px;font-family:-apple-system,sans-serif}
.wa-bbl{background:#202c33;border-radius:0 8px 8px 8px;padding:6px 10px 5px;max-width:84%;align-self:flex-start;position:relative}
.wa-bbl.first::before{content:'';position:absolute;top:0;left:-6px;border-top:8px solid #202c33;border-left:7px solid transparent}
.wa-bbl.mt{margin-top:3px}
.wa-bt{font-size:13px;color:#e9edef;line-height:1.45;font-family:-apple-system,'Segoe UI',sans-serif;word-break:break-word}
.wa-ts{font-size:10px;color:#8696a0;text-align:right;margin-top:2px}
.wa-inputbar{background:#1f2c34;padding:7px 10px;display:flex;align-items:center;gap:8px;border-top:1px solid #2a3942}
.wa-emoji-btn{font-size:22px;line-height:1}
.wa-input-fld{flex:1;background:#2a3942;border-radius:22px;padding:8px 14px;font-size:12px;color:#8696a0;font-family:-apple-system,sans-serif}
.wa-mic-btn{font-size:22px;color:#aebac1}
.wa-home-indicator{background:#0a0a0a;height:20px;display:flex;align-items:center;justify-content:center}
.wa-home-bar{width:100px;height:4px;background:#444;border-radius:4px}
.wa-caption{font-size:11px;color:var(--muted);text-align:center;font-style:italic;margin-top:6px;line-height:1.4}

/* ===== MINI SALES PAGE — RESULT ===== */
.sp-hero{background:linear-gradient(140deg,var(--primary) 0%,#9e4540 100%);color:#fff;border-radius:20px;padding:28px 24px;margin-bottom:16px;text-align:center}
.sp-hero.fi{background:linear-gradient(140deg,#1a4a6b 0%,#2a6e9a 100%)}
.sp-hero.duo{background:linear-gradient(140deg,#5a2d6e 0%,var(--primary) 70%,var(--accent) 100%)}
.sp-hero-tag{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:14px}
.sp-hero-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:12px}
.sp-hero-sub{font-size:14px;line-height:1.65;opacity:.95}
.sp-sec{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 2px 16px rgba(200,112,107,.09)}
.sp-sec-tag{font-size:10px;color:var(--primary);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.sp-sec-tag.fi{color:#1a6b9a}
.sp-sec-tag.duo{color:#5a2d6e}
.sp-sec-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.3}
.sp-sec p{font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:8px}
.sp-sec p:last-child{margin-bottom:0}
.sp-pain{background:linear-gradient(135deg,#fff5f5,#ffe8e8);border:1px solid #f0c0b8;border-radius:12px;padding:16px;margin:12px 0}
.sp-pain h4{font-size:13px;font-weight:700;color:#8b2c2c;margin-bottom:10px}
.sp-pain ul{list-style:none;display:flex;flex-direction:column;gap:7px}
.sp-pain li{font-size:13px;color:#6b2020;display:flex;gap:8px;align-items:flex-start;line-height:1.45}

/* ===== HELPERS ===== */
function optH(label, i) {
  return `<div class="opt" data-i="${i}"><span class="check"></span><span>${label}</span></div>`;
}
function chkH(label, i) {
  return `<div class="chk-opt" data-i="${i}"><span class="chk-box"></span><span>${label}</span></div>`;
}
function flower() {
  return `<div class="logo">🌸</div><div class="brand">VANERIKA AMORIM · RECONSTRUÇÃO FEMININA</div>`;
}
function radio(id, prog, title, opts, sub, tk) {
  return {
    id, prog, type:'radio', tk,
    effects: opts.map(o => o[1]||{}),
    render: () => `
      ${flower()}
      <div class="card">
        <h2 class="q-title">${title}</h2>
        ${sub ? `<p class="q-sub">${sub}</p>` : ''}
        <div class="options" id="opts">
          ${opts.map((o,i) => optH(o[0],i)).join('')}
        </div>
      </div>`
  };
}
function scaleQ(id, prog, statement, effects) {
  return {
    id, prog, type:'scale', effects,
    render: () => `
      ${flower()}
      <div class="card">
        <div class="q-label">Como você se sente em relação a essa afirmação?</div>
        <div class="scale-statement">"${statement}"</div>
        <div class="scale-box">
          <div class="scale-axis"><span>Concordo totalmente</span><span>Discordo totalmente</span></div>
          <div class="scale-track" id="opts">
            <button class="scale-pt" data-i="0">1</button>
            <button class="scale-pt" data-i="1">2</button>
            <button class="scale-pt" data-i="2">3</button>
            <button class="scale-pt" data-i="3">4</button>
            <button class="scale-pt" data-i="4">5</button>
          </div>
          <div class="scale-sub">
            <span>Concordo<br>totalmente</span>
            <span class="mid">Neutro</span>
            <span>Discordo<br>totalmente</span>
          </div>
        </div>
      </div>`
  };
}
function checkbox(id, prog, title, labels, sub, tk) {
  return {
    id, prog, type:'checkbox', tk,
    render: () => `
      ${flower()}
      <div class="card">
        <h2 class="q-title">${title}</h2>
        ${sub ? `<p class="q-sub">${sub}</p>` : ''}
        <div class="options" id="opts">
          ${labels.map((l,i) => chkH(l,i)).join('')}
        </div>
        <button class="btn btn-rose" id="contBtn" style="display:none" onclick="next()">Continuar →</button>
      </div>`
  };
}
function info(id, html) {
  return { id, prog:null, type:'info', render: () => html };
}

/* ===== NAVIGATION ===== */
function render() {
  const s = screens[idx];
  document.getElementById('app').innerHTML = `<div class="screen">${s.render()}</div>`;
  const pb = document.getElementById('progress');
  if(s.prog) { pb.style.width = s.prog + '%'; pb.style.display = 'block'; }
  else { pb.style.display = 'none'; }
  if(s.type === 'radio') bindRadio(s.effects, s.tk);
  else if(s.type === 'scale') bindScale(s.effects);
  else if(s.type === 'checkbox') bindChk(s.tk);
  else if(s.type === 'loading') runLoading();
  window.scrollTo(0,0);
}
function next() {
  if(idx < screens.length - 1) { idx++; render(); }
}

/* ===== BIND RADIO ===== */
function bindRadio(effects, tk) {
  document.querySelectorAll('#opts .opt').forEach(opt => {
    opt.addEventListener('click', () => {
      const i = +opt.dataset.i;
      const eff = effects[i] || {};
      if(eff.em) scoreE += eff.em;
      if(eff.fi) scoreF += eff.fi;
      if(eff.ctx) contexto = eff.ctx;
      if(tk) SA[tk] = i;
      document.querySelectorAll('#opts .opt').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      setTimeout(next, 240);
    }, {once:true});
  });
}

/* ===== BIND SCALE ===== */
function bindScale(effects) {
  document.querySelectorAll('.scale-pt').forEach(pt => {
    pt.addEventListener('click', () => {
      const i = +pt.dataset.i;
      const eff = effects[i] || {};
      if(eff.em) scoreE += eff.em;
      if(eff.fi) scoreF += eff.fi;
      document.querySelectorAll('.scale-pt').forEach(p => p.classList.remove('sel'));
      pt.classList.add('sel');
      setTimeout(next, 320);
    }, {once:true});
  });
}

/* ===== BIND CHECKBOX ===== */
function bindChk(tk) {
  document.querySelectorAll('#opts .chk-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      opt.classList.toggle('selected');
      if(tk) {
        SA[tk] = [...document.querySelectorAll('#opts .chk-opt.selected')].map(el => +el.dataset.i);
      }
      const any = document.querySelectorAll('#opts .chk-opt.selected').length > 0;
      const btn = document.getElementById('contBtn');
      if(btn) btn.style.display = any ? 'block' : 'none';
    });
  });
}

/* ===== LOADING ===== */
function runLoading() {
  const msgs = [
    'Analisando seu perfil de travamento...',
    'Identificando seu ponto de partida...',
    'Cruzando padrões emocionais e financeiros...',
    'Diagnóstico pronto ✓'
  ];
  let i = 0;
  const el = document.getElementById('ldStatus');
  const t = setInterval(() => {
    i++;
    if(i < msgs.length && el) el.textContent = msgs[i];
    if(i >= msgs.length) clearInterval(t);
  }, 1000);
  setTimeout(() => {
    const lb = document.getElementById('ldBox');
    const fb = document.getElementById('formBox');
    if(lb) lb.style.display = 'none';
    if(fb) fb.style.display = 'block';
    window.scrollTo(0,0);
  }, 4000);
}
